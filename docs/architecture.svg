<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 540" role="img" width="100%">
  <title>Open MDR Home Lab - Architecture</title>
  <desc>Three telemetry sources feed Wazuh; Wazuh Manager forwards alerts to n8n, which fans out to Telegram, pfSense API blocking, and a monthly PDF report.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .t { font: 500 14px -apple-system, system-ui, "Segoe UI", sans-serif; }
      .ts { font: 400 12px -apple-system, system-ui, "Segoe UI", sans-serif; }
      .label { font: 500 11px -apple-system, system-ui, "Segoe UI", sans-serif; fill: #5F5E5A; }
      .section { font: 500 11px -apple-system, system-ui, "Segoe UI", sans-serif; fill: #888780; letter-spacing: 0.6px; }
      .arr { stroke: #888780; stroke-width: 1; fill: none; }
      .group-bg { fill: none; stroke: #B4B2A9; stroke-width: 0.5; stroke-dasharray: 4 3; }
      .blue rect { fill: #E6F1FB; stroke: #185FA5; }
      .blue .title { fill: #0C447C; }
      .blue .sub { fill: #185FA5; }
      .purple rect { fill: #EEEDFE; stroke: #534AB7; }
      .purple .title { fill: #3C3489; }
      .purple .sub { fill: #534AB7; }
      .teal rect { fill: #E1F5EE; stroke: #0F6E56; }
      .teal .title { fill: #085041; }
      .teal .sub { fill: #0F6E56; }
      @media (prefers-color-scheme: dark) {
        .label { fill: #B4B2A9; }
        .section { fill: #B4B2A9; }
        .arr { stroke: #B4B2A9; }
        .group-bg { stroke: #5F5E5A; }
        .blue rect { fill: #0C447C; stroke: #85B7EB; }
        .blue .title { fill: #B5D4F4; }
        .blue .sub { fill: #85B7EB; }
        .purple rect { fill: #3C3489; stroke: #AFA9EC; }
        .purple .title { fill: #CECBF6; }
        .purple .sub { fill: #AFA9EC; }
        .teal rect { fill: #085041; stroke: #5DCAA5; }
        .teal .title { fill: #9FE1CB; }
        .teal .sub { fill: #5DCAA5; }
      }
    </style>
  </defs>
  <text class="section" x="40" y="30">TELEMETRY SOURCES</text>
  <g class="blue">
    <rect x="40" y="44" width="180" height="56" rx="8" stroke-width="0.8"/>
    <text class="t title" x="130" y="68" text-anchor="middle" dominant-baseline="central">Windows endpoint</text>
    <text class="ts sub" x="130" y="86" text-anchor="middle" dominant-baseline="central">Sysmon + ASR + 4104</text>
  </g>
  <g class="blue">
    <rect x="250" y="44" width="180" height="56" rx="8" stroke-width="0.8"/>
    <text class="t title" x="340" y="68" text-anchor="middle" dominant-baseline="central">Linux endpoint</text>
    <text class="ts sub" x="340" y="86" text-anchor="middle" dominant-baseline="central">auditd + Wazuh agent</text>
  </g>
  <g class="blue">
    <rect x="460" y="44" width="180" height="56" rx="8" stroke-width="0.8"/>
    <text class="t title" x="550" y="68" text-anchor="middle" dominant-baseline="central">pfSense + Suricata</text>
    <text class="ts sub" x="550" y="86" text-anchor="middle" dominant-baseline="central">Network IDS</text>
  </g>
  <line class="arr" x1="130" y1="100" x2="310" y2="184" marker-end="url(#arrow)"/>
  <line class="arr" x1="340" y1="100" x2="340" y2="184" marker-end="url(#arrow)"/>
  <line class="arr" x1="550" y1="100" x2="370" y2="184" marker-end="url(#arrow)"/>
  <text class="label" x="200" y="130">1514 / 1515</text>
  <text class="label" x="430" y="130">syslog</text>
  <text class="section" x="40" y="174">DETECTION CORE - WAZUH STACK</text>
  <rect class="group-bg" x="24" y="178" width="632" height="80" rx="10"/>
  <g class="purple">
    <rect x="40" y="188" width="180" height="56" rx="8" stroke-width="0.8"/>
    <text class="t title" x="130" y="212" text-anchor="middle" dominant-baseline="central">Wazuh Indexer</text>
    <text class="ts sub" x="130" y="230" text-anchor="middle" dominant-baseline="central">OpenSearch - 4 GB heap</text>
  </g>
  <g class="purple">
    <rect x="250" y="188" width="180" height="56" rx="8" stroke-width="0.8"/>
    <text class="t title" x="340" y="212" text-anchor="middle" dominant-baseline="central">Wazuh Manager</text>
    <text class="ts sub" x="340" y="230" text-anchor="middle" dominant-baseline="central">Rules, FIM, vuln, YARA</text>
  </g>
  <g class="purple">
    <rect x="460" y="188" width="180" height="56" rx="8" stroke-width="0.8"/>
    <text class="t title" x="550" y="212" text-anchor="middle" dominant-baseline="central">Wazuh Dashboard</text>
    <text class="ts sub" x="550" y="230" text-anchor="middle" dominant-baseline="central">Analyst UI, MITRE view</text>
  </g>
  <line class="arr" x1="340" y1="244" x2="340" y2="320" marker-end="url(#arrow)"/>
  <text class="label" x="348" y="285">webhook on alert</text>
  <text class="section" x="40" y="312">SOAR</text>
  <g class="teal">
    <rect x="250" y="320" width="180" height="56" rx="8" stroke-width="0.8"/>
    <text class="t title" x="340" y="344" text-anchor="middle" dominant-baseline="central">n8n</text>
    <text class="ts sub" x="340" y="362" text-anchor="middle" dominant-baseline="central">Routing + safety controls</text>
  </g>
  <line class="arr" x1="290" y1="376" x2="160" y2="442" marker-end="url(#arrow)"/>
  <line class="arr" x1="340" y1="376" x2="340" y2="442" marker-end="url(#arrow)"/>
  <line class="arr" x1="390" y1="376" x2="520" y2="442" marker-end="url(#arrow)"/>
  <text class="section" x="40" y="430">RESPONSE AND OUTPUTS</text>
  <g class="teal">
    <rect x="40" y="446" width="180" height="56" rx="8" stroke-width="0.8"/>
    <text class="t title" x="130" y="470" text-anchor="middle" dominant-baseline="central">TheHive case</text>
    <text class="ts sub" x="130" y="488" text-anchor="middle" dominant-baseline="central">Auto-created from alert</text>
  </g>
  <g class="teal">
    <rect x="250" y="446" width="180" height="56" rx="8" stroke-width="0.8"/>
    <text class="t title" x="340" y="470" text-anchor="middle" dominant-baseline="central">pfSense API block</text>
    <text class="ts sub" x="340" y="488" text-anchor="middle" dominant-baseline="central">Allowlist + TTL + breaker</text>
  </g>
  <g class="teal">
    <rect x="460" y="446" width="180" height="56" rx="8" stroke-width="0.8"/>
    <text class="t title" x="550" y="470" text-anchor="middle" dominant-baseline="central">Cortex enrichment</text>
    <text class="ts sub" x="550" y="488" text-anchor="middle" dominant-baseline="central">VT, AbuseIPDB, custom</text>
  </g>
</svg>
