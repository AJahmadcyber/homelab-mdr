# Cortex custom config — overrides entrypoint-generated defaults (included last)
play.http.secret.key = "CHANGE_ME_GENERATE_A_SECRET"
search.uri = "http://elasticsearch:9200"
job {
  runners = [docker]
  directory = "/opt/cortex/jobs"
  dockerDirectory = "/opt/cortex/jobs"
}
analyzer.urls  = ["https://catalogs.download.strangebee.com/latest/json/analyzers.json"]
responder.urls = ["https://catalogs.download.strangebee.com/latest/json/responders.json"]
